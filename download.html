<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Download</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
color:white;

}

.container p{
font-size:14px;
opacity:0.9;
margin-bottom:30px;
}

.download-btn{
display:inline-block;
padding:14px 28px;
border-radius:50px;
background:white;
color:#764ba2;
font-weight:bold;
text-decoration:none;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.download-btn:hover{
transform:scale(1.1);
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.icon{
font-size:60px;
margin-bottom:15px;
}

.footer{
margin-top:25px;
font-size:12px;
opacity:0.7;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}

</head>

<div class="container">
